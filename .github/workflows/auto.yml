name: Auto Deploy

on:
  push:
    branches:
      - main
  schedule:
    - cron: 0 0 * * *
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      TARGET_REPO: "tiramisulabs/seyfert"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Clone target repository
        run: git clone https://github.com/${{ env.TARGET_REPO }}.git target-repo

      - name: Get latest commit SHA
        id: get-sha
        run: |
          LATEST_SHA=$(git -C target-repo rev-parse HEAD)
          echo "latest_sha=$LATEST_SHA" >> $GITHUB_OUTPUT

      - name: Read cached SHA
        id: read-cache
        run: |
          if [ -f .last-sha ]; then
            echo "cached_sha=$(cat .last-sha)" >> $GITHUB_OUTPUT
          else
            echo "cached_sha=" >> $GITHUB_OUTPUT
          fi

      - name: Check for updates
        id: check-update
        run: |
          if [ "${{ steps.get-sha.outputs.latest_sha }}" != "${{ steps.read-cache.outputs.cached_sha }}" ]; then
            echo "has_update=true" >> $GITHUB_OUTPUT
          else
            echo "has_update=false" >> $GITHUB_OUTPUT
          fi

      - name: Install target repo dependencies
        if: steps.check-update.outputs.has_update == 'true'
        run: |
          cd target-repo
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Install TypeDoc and plugin
        if: steps.check-update.outputs.has_update == 'true'
        run: |
          cd target-repo
          npm install --save-dev typedoc typedoc-material-theme

      - name: Generate docs
        if: steps.check-update.outputs.has_update == 'true'
        run: |
          cd target-repo
          npx typedoc --entryPoints src/index.ts --plugin typedoc-material-theme --out ../docs-output

      - name: Save SHA and push to main
        if: steps.check-update.outputs.has_update == 'true'
        run: |
          echo "${{ steps.get-sha.outputs.latest_sha }}" > .last-sha
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .last-sha
          git commit -m "chore: update SHA cache @ ${{ steps.get-sha.outputs.latest_sha }}"
          git push origin main

      - name: Upload pages artifact
        if: steps.check-update.outputs.has_update == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs-output

      - name: Deploy to GitHub Pages
        if: steps.check-update.outputs.has_update == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
